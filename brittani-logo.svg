<?xml version="1.0" encoding="UTF-8"?>
<!--
  brittani-logo.svg
  ViewBox: 640 × 120  (40px padding left/right, 20px top/bottom)
  Text center: x=320  |  Text area: x=40 to x=600 (560px usable)
  "BRITTANI" #111111  +  " PRESCHEL" #C4004F via <tspan> on same baseline
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120"
     overflow="visible"
     role="img" aria-label="Brittani Preschel — CEO, Founder, Speaker, Digital Strategist">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!--
    on-light : white background version  — shown by default
    on-dark  : transparent background version — hidden by default
  -->

  <!-- ═══ ON-LIGHT: white background ═══ -->
  <g id="on-light">
    <rect width="640" height="120" fill="#ffffff"/>

    <!-- Wordmark: BRITTANI in #111111, PRESCHEL in #C4004F, same baseline -->
    <text
      x="320" y="62"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-weight="700"
      font-size="44"
      letter-spacing="6.6"
      text-anchor="middle">
      <tspan fill="#111111">BRITTANI</tspan><tspan fill="#C4004F"> PRESCHEL</tspan>
    </text>

    <!-- Divider rule at 40% opacity -->
    <line x1="40" y1="76" x2="600" y2="76"
      stroke="#C4004F" stroke-opacity="0.4" stroke-width="1"/>

    <!-- Tagline: 40% of 44px ≈ 18px, weight 300 -->
    <text
      x="320" y="100"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-weight="300"
      font-size="18"
      letter-spacing="3.6"
      fill="#888888"
      text-anchor="middle">CEO · FOUNDER · SPEAKER · DIGITAL STRATEGIST</text>
  </g>

  <!-- ═══ ON-DARK: transparent background ═══ -->
  <g id="on-dark" display="none">

    <!-- Wordmark: BRITTANI in near-white, PRESCHEL in #C4004F -->
    <text
      x="320" y="62"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-weight="700"
      font-size="44"
      letter-spacing="6.6"
      text-anchor="middle">
      <tspan fill="#f0f0f0">BRITTANI</tspan><tspan fill="#C4004F"> PRESCHEL</tspan>
    </text>

    <!-- Divider rule, more opaque on dark -->
    <line x1="40" y1="76" x2="600" y2="76"
      stroke="#C4004F" stroke-opacity="0.6" stroke-width="1"/>

    <!-- Tagline — lighter gray for dark backgrounds -->
    <text
      x="320" y="100"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-weight="300"
      font-size="18"
      letter-spacing="3.6"
      fill="#aaaaaa"
      text-anchor="middle">CEO · FOUNDER · SPEAKER · DIGITAL STRATEGIST</text>
  </g>
</svg>
